services:
  - type: web
    name: restaurant-rag-backend
    env: python
    # Set the root directory for standard operations to backend/
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false # Requires manual insertion via Render Web UI
    # Provision a persistent 1GB Disk so ChromaDB vector database saves don't disappear on reboot
    disk:
      name: chroma-vectorstore
      mountPath: /data
      sizeGB: 1
